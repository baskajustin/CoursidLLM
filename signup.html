<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign up — Coursid</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/main.css">
  <style>
    body { background: #f7f9fa; min-height: 100vh; display: flex; flex-direction: column; }
    .auth-nav { background:#fff;border-bottom:1px solid #e8e9eb;height:56px;display:flex;align-items:center;padding:0 24px;justify-content:space-between; }
    .auth-logo { font-size:22px;font-weight:800;text-decoration:none;color:#1c1d1f; }
    .auth-logo span { color:#a435f0; }
    .auth-page { flex:1;display:flex;align-items:center;justify-content:center;padding:40px 16px; }
    .auth-card { background:#fff;border:1px solid #e8e9eb;border-radius:8px;padding:40px;width:100%;max-width:480px;box-shadow:0 2px 20px rgba(0,0,0,0.08); }
    .auth-title { font-size:28px;font-weight:800;text-align:center;margin-bottom:6px; }
    .auth-sub { text-align:center;color:#6a6f73;font-size:15px;margin-bottom:28px; }
    .social-btn { display:flex;align-items:center;justify-content:center;gap:10px;width:100%;padding:10px;border:1px solid #d1d5db;border-radius:6px;font-size:14px;font-weight:600;background:#fff;cursor:pointer;margin-bottom:10px;transition:background 0.15s; }
    .social-btn:hover { background:#f7f9fa; }
    .divider-or { display:flex;align-items:center;gap:12px;margin:20px 0;color:#b4bac4;font-size:13px; }
    .divider-or::before,.divider-or::after { content:'';flex:1;height:1px;background:#e8e9eb; }
    .auth-switch { text-align:center;font-size:14px;color:#6a6f73;margin-top:20px; }
    .auth-switch a { color:#a435f0;font-weight:600;cursor:pointer; }
    .auth-switch a:hover { text-decoration:underline; }
    .error-box { background:#fee2e2;border:1px solid #fecaca;border-radius:6px;padding:10px 14px;font-size:13px;color:#991b1b;margin-bottom:16px; }
    .terms-row { display:flex;align-items:flex-start;gap:8px;font-size:13px;color:#6a6f73;margin-bottom:20px; }
    .terms-row input { margin-top:2px;cursor:pointer;accent-color:#a435f0; }
    .terms-row a { color:#a435f0; }
    .grid-2 { display:grid;grid-template-columns:1fr 1fr;gap:16px; }
    .benefit-list { background:#f7f9fa;border-radius:8px;padding:16px;margin-bottom:24px; }
    .benefit-item { display:flex;align-items:center;gap:8px;font-size:13px;color:#3d3d3d;margin-bottom:8px; }
    .benefit-item:last-child { margin-bottom:0; }
  </style>
</head>
<body>

<div class="auth-nav">
  <a href="index.html" class="auth-logo">Cours<span>id</span></a>
  <a href="login.html" class="btn btn-outline-black btn-sm">Log in</a>
</div>

<div class="auth-page">
  <div class="auth-card">
    <div class="auth-title">Start learning today</div>
    <div class="auth-sub">Join 74 million learners on Coursid</div>

    <div class="benefit-list">
      <div class="benefit-item">✅ Free access to thousands of courses</div>
      <div class="benefit-item">✅ Learn at your own pace, any device</div>
      <div class="benefit-item">✅ Earn certificates of completion</div>
    </div>

    <button class="social-btn" onclick="UI.toast('Google signup coming soon!')">
      <svg width="18" height="18" viewBox="0 0 24 24"><path fill="#4285f4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34a853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#fbbc05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#ea4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
      Continue with Google
    </button>

    <div class="divider-or">or</div>

    <div id="error-box" class="error-box" style="display:none;"></div>

    <form onsubmit="handleSignup(event)">
      <div class="grid-2">
        <div class="form-group">
          <label class="label">First name</label>
          <input class="input" id="signup-first" type="text" placeholder="Alex" required>
        </div>
        <div class="form-group">
          <label class="label">Last name</label>
          <input class="input" id="signup-last" type="text" placeholder="Johnson" required>
        </div>
      </div>
      <div class="form-group">
        <label class="label">Email</label>
        <input class="input" id="signup-email" type="email" placeholder="name@email.com" required autocomplete="email">
      </div>
      <div class="form-group">
        <label class="label">Password</label>
        <input class="input" id="signup-password" type="password" placeholder="At least 6 characters" required minlength="6" autocomplete="new-password">
      </div>
      <div class="terms-row">
        <input type="checkbox" id="agree-terms" required>
        <label for="agree-terms">I agree to the <a href="#">Terms of Service</a> and <a href="#">Privacy Policy</a></label>
      </div>
      <button type="submit" class="btn btn-purple btn-full" id="signup-btn">Create free account</button>
    </form>

    <div class="auth-switch">
      Already have an account? <a href="login.html">Log in</a>
    </div>
  </div>
</div>

<div id="toast-container" class="toast-container"></div>

<script src="data/courses.js"></script>
<script src="js/api.js"></script>
<script>
  const params = new URLSearchParams(location.search);
  const plan = params.get('plan') || 'free';
  const redirect = params.get('redirect') || 'dashboard.html';

  if (Auth.isLoggedIn()) window.location = redirect;

  async function handleSignup(e) {
    e.preventDefault();
    const first    = document.getElementById('signup-first').value.trim();
    const last     = document.getElementById('signup-last').value.trim();
    const email    = document.getElementById('signup-email').value.trim();
    const password = document.getElementById('signup-password').value;
    const btn      = document.getElementById('signup-btn');
    const errBox   = document.getElementById('error-box');

    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span> Creating account…';
    errBox.style.display = 'none';

    try {
      await Auth.signup(`${first} ${last}`, email, password);
      UI.toast('Account created! Welcome to Coursid 🎉', 'success', 3000);
      setTimeout(() => window.location = redirect, 800);
    } catch(err) {
      errBox.style.display = 'block';
      errBox.textContent = err.message;
      btn.disabled = false;
      btn.textContent = 'Create free account';
    }
  }
</script>
</body>
</html>
