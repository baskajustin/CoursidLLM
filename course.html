<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title id="page-title">Course — Coursid</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/main.css">
  <style>
    /* Course Hero */
    .course-hero {
      background: #1c1d1f;
      color: #fff;
      padding: 40px 0;
    }
    .course-hero-inner {
      max-width: 760px;
    }
    .course-breadcrumb {
      display: flex; align-items: center; gap: 6px;
      font-size: 13px; color: #ccc; margin-bottom: 16px; flex-wrap: wrap;
    }
    .course-breadcrumb a { color: #cdd9f5; cursor: pointer; }
    .course-breadcrumb a:hover { text-decoration: underline; }
    .course-breadcrumb-sep { color: #888; }
    .course-hero-title {
      font-size: 32px; font-weight: 800; line-height: 1.2;
      margin-bottom: 16px; color: #fff;
    }
    .course-hero-subtitle {
      font-size: 18px; color: #dde; line-height: 1.5;
      margin-bottom: 20px;
    }
    .course-hero-meta {
      display: flex; align-items: center; flex-wrap: wrap; gap: 12px;
      font-size: 14px; color: #ccc; margin-bottom: 16px;
    }
    .course-hero-meta .rating-score { color: #f4c150; font-weight: 700; }
    .course-hero-meta .stars { color: #f4c150; }
    .course-hero-meta a { color: #cdd9f5; text-decoration: underline; cursor: pointer; }
    .course-hero-instructor {
      font-size: 14px; color: #ccc; margin-bottom: 12px;
    }
    .course-hero-instructor a { color: #cdd9f5; text-decoration: underline; cursor: pointer; }
    .course-hero-badges {
      display: flex; gap: 8px; flex-wrap: wrap; margin-top: 12px;
    }
    .hero-badge {
      display: flex; align-items: center; gap: 6px;
      font-size: 13px; color: #dde; padding: 4px 0;
    }
    .hero-badge-icon { font-size: 15px; }

    /* Layout: 2-col when wide */
    .course-layout {
      display: grid;
      grid-template-columns: 1fr 340px;
      gap: 32px;
      align-items: start;
      padding: 40px 0;
    }

    .course-main { min-width: 0; }

    /* Sticky sidebar card */
    .course-sidebar {
      position: sticky;
      top: 72px;
    }

    .sidebar-card {
      background: #fff;
      border: 1px solid #e8e9eb;
      border-radius: 8px;
      overflow: hidden;
      box-shadow: 0 2px 16px rgba(0,0,0,0.1);
    }

    .sidebar-preview {
      position: relative;
      aspect-ratio: 16/9;
      background: #1c1d1f;
      cursor: pointer;
      overflow: hidden;
    }
    .sidebar-preview img {
      width: 100%; height: 100%; object-fit: cover;
      opacity: 0.7;
    }
    .sidebar-play {
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
    }
    .sidebar-play-btn {
      width: 60px; height: 60px;
      background: rgba(255,255,255,0.95);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      transition: transform 0.2s;
    }
    .sidebar-preview:hover .sidebar-play-btn { transform: scale(1.1); }
    .sidebar-preview-label {
      position: absolute; bottom: 12px; left: 50%; transform: translateX(-50%);
      font-size: 13px; font-weight: 600; color: #fff;
      text-shadow: 0 1px 3px rgba(0,0,0,0.5);
    }

    .sidebar-body { padding: 20px; }

    .sidebar-price-row {
      display: flex; align-items: center; gap: 10px; margin-bottom: 16px;
    }
    .sidebar-price-current { font-size: 30px; font-weight: 800; color: #1c1d1f; }
    .sidebar-price-original {
      font-size: 16px; color: #6a6f73; text-decoration: line-through;
    }
    .sidebar-discount {
      font-size: 14px; font-weight: 700; color: #b11116;
    }

    .sidebar-timer {
      font-size: 13px; color: #b11116; font-weight: 600;
      margin-bottom: 16px; display: flex; align-items: center; gap: 6px;
    }

    .sidebar-includes {
      margin-top: 20px;
    }
    .sidebar-includes-title {
      font-size: 15px; font-weight: 700; margin-bottom: 12px;
    }
    .sidebar-include-item {
      display: flex; align-items: center; gap: 10px;
      font-size: 14px; color: #3d3d3d; margin-bottom: 8px;
    }
    .sidebar-include-icon { font-size: 16px; flex-shrink: 0; width: 20px; text-align: center; }

    .sidebar-links {
      display: flex; gap: 16px; margin-top: 16px;
      justify-content: center; font-size: 13px; color: #6a6f73;
    }
    .sidebar-links a { cursor: pointer; text-decoration: underline; }
    .sidebar-links a:hover { color: #1c1d1f; }

    .sidebar-guarantee {
      display: flex; align-items: center; gap: 8px;
      font-size: 12px; color: #6a6f73; margin-top: 16px;
      padding: 10px; background: #f7f9fa; border-radius: 6px;
    }

    /* What you'll learn */
    .learn-box {
      border: 1px solid #e8e9eb;
      border-radius: 8px;
      padding: 24px;
      margin-bottom: 32px;
    }
    .learn-box-title {
      font-size: 22px; font-weight: 800; margin-bottom: 20px;
    }
    .learn-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px 24px;
    }

    /* Course content */
    .content-header {
      display: flex; align-items: center; justify-content: space-between;
      flex-wrap: wrap; gap: 12px; margin-bottom: 16px;
    }
    .content-title { font-size: 22px; font-weight: 800; }
    .content-meta {
      font-size: 14px; color: #6a6f73;
      display: flex; gap: 8px; align-items: center; flex-wrap: wrap;
    }
    .content-meta-dot { color: #b4bac4; }
    .expand-all {
      font-size: 14px; color: #6a6f73; cursor: pointer;
      text-decoration: underline; white-space: nowrap;
    }
    .expand-all:hover { color: #1c1d1f; }

    /* Requirements */
    .requirements-section { margin-top: 32px; }
    .requirements-title { font-size: 22px; font-weight: 800; margin-bottom: 16px; }
    .req-item {
      display: flex; align-items: flex-start; gap: 8px;
      font-size: 15px; color: #3d3d3d; margin-bottom: 8px;
    }
    .req-bullet { color: #1c1d1f; margin-top: 3px; flex-shrink: 0; }

    /* Instructor section */
    .instructor-section { margin-top: 40px; padding-top: 32px; border-top: 1px solid #e8e9eb; }
    .instructor-title { font-size: 22px; font-weight: 800; margin-bottom: 20px; }
    .instructor-card { display: flex; gap: 20px; align-items: flex-start; }
    .instructor-avatar {
      width: 80px; height: 80px; border-radius: 50%;
      background: linear-gradient(135deg, #a435f0, #7c3aed);
      display: flex; align-items: center; justify-content: center;
      font-size: 28px; font-weight: 800; color: #fff; flex-shrink: 0;
      cursor: pointer;
    }
    .instructor-name {
      font-size: 18px; font-weight: 700; color: #a435f0;
      cursor: pointer; margin-bottom: 4px;
    }
    .instructor-name:hover { text-decoration: underline; }
    .instructor-title-text { font-size: 14px; color: #6a6f73; margin-bottom: 12px; }
    .instructor-stats { display: flex; gap: 20px; flex-wrap: wrap; margin-bottom: 14px; }
    .instructor-stat { font-size: 14px; color: #3d3d3d; display: flex; align-items: center; gap: 6px; }
    .instructor-bio { font-size: 15px; color: #3d3d3d; line-height: 1.7; }

    /* Reviews section */
    .reviews-section { margin-top: 40px; padding-top: 32px; border-top: 1px solid #e8e9eb; }
    .reviews-title { font-size: 22px; font-weight: 800; margin-bottom: 20px; }
    .reviews-summary {
      display: flex; gap: 32px; align-items: center;
      padding: 24px; background: #f7f9fa; border-radius: 8px;
      margin-bottom: 24px;
    }
    .reviews-big-score {
      text-align: center; flex-shrink: 0;
    }
    .reviews-big-num { font-size: 64px; font-weight: 800; color: #b4690e; line-height: 1; }
    .reviews-big-stars { font-size: 20px; color: #f4c150; }
    .reviews-big-label { font-size: 13px; color: #6a6f73; }
    .reviews-bars { flex: 1; }
    .review-bar-row {
      display: flex; align-items: center; gap: 10px; margin-bottom: 6px;
    }
    .review-bar-label { font-size: 13px; color: #6a6f73; white-space: nowrap; }
    .review-bar-wrap { flex: 1; height: 8px; background: #e8e9eb; border-radius: 99px; overflow: hidden; }
    .review-bar-fill { height: 100%; background: #b4690e; border-radius: 99px; }
    .review-bar-pct { font-size: 13px; color: #6a6f73; width: 32px; text-align: right; }
    .review-card {
      border-bottom: 1px solid #e8e9eb; padding: 20px 0;
    }
    .review-card:last-child { border-bottom: none; }
    .reviewer-row { display: flex; align-items: center; gap: 12px; margin-bottom: 10px; }
    .reviewer-avatar {
      width: 40px; height: 40px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-weight: 700; color: #fff; font-size: 15px; flex-shrink: 0;
    }
    .reviewer-name { font-size: 15px; font-weight: 700; }
    .reviewer-date { font-size: 13px; color: #6a6f73; }
    .review-stars { color: #f4c150; font-size: 14px; margin-bottom: 8px; }
    .review-text { font-size: 14px; color: #3d3d3d; line-height: 1.6; }

    /* Mobile sticky bar */
    .mobile-sticky {
      display: none;
      position: fixed; bottom: 0; left: 0; right: 0; z-index: 300;
      background: #fff; border-top: 1px solid #e8e9eb;
      padding: 12px 16px;
      align-items: center; justify-content: space-between;
      gap: 12px;
    }
    .mobile-sticky-price { font-size: 22px; font-weight: 800; color: #1c1d1f; }
    .mobile-sticky-original { font-size: 13px; color: #6a6f73; text-decoration: line-through; }

    @media (max-width: 960px) {
      .course-layout { grid-template-columns: 1fr; }
      .course-sidebar { position: static; }
      .sidebar-card { max-width: 480px; margin: 0 auto; }
      .mobile-sticky { display: flex; }
      body { padding-bottom: 80px; }
    }
    @media (max-width: 600px) {
      .course-hero-title { font-size: 24px; }
      .course-hero-subtitle { font-size: 16px; }
      .learn-grid { grid-template-columns: 1fr; }
      .reviews-summary { flex-direction: column; gap: 20px; }
    }
  </style>
</head>
<body>

<!-- NAV -->
<nav class="nav">
  <div class="container nav-inner">
    <a href="index.html" class="nav-logo">Cours<span>id</span></a>
    <form id="nav-search-form" class="nav-search">
      <div class="nav-search-inner">
        <input id="nav-search-input" type="text" placeholder="Search for anything">
        <button type="submit" class="nav-search-btn">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        </button>
      </div>
    </form>
    <div class="nav-links flex gap-8">
      <div style="position:relative;">
        <a href="cart.html" class="nav-link flex gap-4">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>
          Cart
        </a>
        <span id="cart-badge" style="position:absolute;top:-4px;right:-4px;background:#a435f0;color:#fff;border-radius:50%;width:18px;height:18px;display:none;align-items:center;justify-content:center;font-size:11px;font-weight:700;">0</span>
      </div>
      <div id="nav-user-area" class="flex gap-8"></div>
    </div>
  </div>
</nav>

<!-- HERO (populated by JS) -->
<div id="course-hero" class="course-hero">
  <div class="container">
    <div class="course-hero-inner">
      <!-- breadcrumb -->
      <div class="course-breadcrumb" id="course-breadcrumb"></div>
      <!-- title etc loaded dynamically -->
      <div id="course-hero-content">
        <div style="color:#888;font-size:15px;">Loading course…</div>
      </div>
    </div>
  </div>
</div>

<!-- MAIN LAYOUT -->
<div class="container">
  <div class="course-layout">

    <!-- LEFT: main content -->
    <div class="course-main" id="course-main">
      <div style="color:#888;padding:48px 0 24px;">Loading…</div>
    </div>

    <!-- RIGHT: sticky sidebar -->
    <aside class="course-sidebar">
      <div class="sidebar-card" id="sidebar-card">
        <div style="height:220px;background:#1c1d1f;display:flex;align-items:center;justify-content:center;color:#888;font-size:14px;">
          Loading…
        </div>
      </div>
    </aside>

  </div>
</div>

<!-- MOBILE STICKY BAR -->
<div class="mobile-sticky" id="mobile-sticky" style="display:none;">
  <div>
    <div class="mobile-sticky-price" id="mobile-price">$0</div>
    <div class="mobile-sticky-original" id="mobile-original"></div>
  </div>
  <button class="btn btn-purple" id="mobile-enroll-btn" style="flex:1;max-width:240px;">Add to cart</button>
</div>

<div id="toast-container" class="toast-container"></div>

<script src="data/courses.js"></script>
<script src="js/api.js"></script>
<script>
const svgCheck = `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20,6 9,17 4,12"/></svg>`;
const svgPlay  = `<svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><polygon points="5,3 19,12 5,21"/></svg>`;
const svgDoc   = `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14,2H6a2,2,0,0,0-2,2V20a2,2,0,0,0,2,2H18a2,2,0,0,0,2-2V8Z"/><polyline points="14,2 14,8 20,8"/></svg>`;
const svgDown  = `<svg class="accordion-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6,9 12,15 18,9"/></svg>`;

let currentCourse = null;

document.addEventListener('DOMContentLoaded', async () => {
  initNav();

  const params = new URLSearchParams(location.search);
  const id = params.get('id') || params.get('slug') || 'c001';

  try {
    const course = await CoursidAPI.getCourse(id);
    if (!course || course.error) throw new Error('Not found');
    currentCourse = course;
    renderPage(course);
  } catch (e) {
    document.getElementById('course-hero-content').innerHTML = `<div style="color:#f66;">Course not found.</div>`;
  }
});

function renderPage(c) {
  document.title = c.title + ' — Coursid';
  document.getElementById('page-title').textContent = c.title + ' — Coursid';

  renderHero(c);
  renderMain(c);
  renderSidebar(c);
  renderMobileBar(c);
}

/* ─ HERO ─ */
function renderHero(c) {
  const enrolled = Auth.isEnrolled(c.id);
  const totalLectures = c.sections.reduce((s, sec) => s + (sec.lectures?.length || sec.lectureCount || 0), 0);
  const totalSections = c.sections.length;

  document.getElementById('course-breadcrumb').innerHTML = `
    <a href="index.html">Home</a>
    <span class="course-breadcrumb-sep">›</span>
    <a href="catalog.html?category=${c.category}">${c.category.replace('-', ' ').replace(/\b\w/g,l=>l.toUpperCase())}</a>
    <span class="course-breadcrumb-sep">›</span>
    <span style="color:#fff;">${c.title.length > 50 ? c.title.slice(0,50)+'…' : c.title}</span>
  `;

  document.getElementById('course-hero-content').innerHTML = `
    <h1 class="course-hero-title">${c.title}</h1>
    <p class="course-hero-subtitle">${c.subtitle}</p>
    <div class="course-hero-meta">
      ${c.bestseller ? '<span class="badge badge-yellow">Bestseller</span>' : ''}
      <span class="rating-score">${(c.rating||0).toFixed(1)}</span>
      <span class="stars">${'★'.repeat(Math.round(c.rating||0))}${'☆'.repeat(5-Math.round(c.rating||0))}</span>
      <a>(${UI.formatNumber(c.ratingsCount||0)} ratings)</a>
      <span>${UI.formatNumber(c.studentsCount||0)} students</span>
    </div>
    <div class="course-hero-instructor">Created by <a id="hero-instructor-link">${c.instructor?.name||'Instructor'}</a></div>
    <div class="course-hero-badges">
      <div class="hero-badge"><span class="hero-badge-icon">🕐</span> Last updated ${c.lastUpdated}</div>
      <div class="hero-badge"><span class="hero-badge-icon">🌐</span> ${c.language}</div>
      <div class="hero-badge"><span class="hero-badge-icon">📊</span> ${c.level.charAt(0).toUpperCase()+c.level.slice(1)} level</div>
      <div class="hero-badge"><span class="hero-badge-icon">📚</span> ${totalSections} sections • ${totalLectures} lectures</div>
    </div>
  `;
}

/* ─ MAIN CONTENT ─ */
function renderMain(c) {
  const totalLectures = c.sections.reduce((s,sec)=>s+(sec.lectures?.length||sec.lectureCount||0),0);
  const totalSections = c.sections.length;
  // calculate total duration
  let totalMin = 0;
  c.sections.forEach(sec => {
    const [h, m] = (sec.duration || '0h 0m').split('h ');
    totalMin += (parseInt(h)||0)*60 + (parseInt(m)||0);
  });
  const totalHours = Math.floor(totalMin/60);
  const remMin    = totalMin % 60;

  document.getElementById('course-main').innerHTML = `

    <!-- What you'll learn -->
    <div class="learn-box">
      <div class="learn-box-title">What you'll learn</div>
      <div class="learn-grid">
        ${(c.learningOutcomes||[]).map(o=>`
          <div class="check-item">
            <span class="check-icon">${svgCheck}</span>
            <span>${o}</span>
          </div>
        `).join('')}
      </div>
    </div>

    <!-- Course Includes (for mobile) -->
    <div class="sidebar-includes" style="display:none;" id="mobile-includes">
      <div class="sidebar-includes-title">This course includes:</div>
      ${renderIncludes(c)}
    </div>

    <!-- Requirements -->
    <div class="requirements-section">
      <div class="requirements-title">Requirements</div>
      ${(c.requirements||[]).map(r=>`
        <div class="req-item">
          <span class="req-bullet">•</span>
          <span>${r}</span>
        </div>
      `).join('')}
    </div>

    <!-- Course Content -->
    <div style="margin-top:40px;padding-top:32px;border-top:1px solid #e8e9eb;">
      <div class="content-header">
        <div class="content-title">Course content</div>
        <div>
          <div class="content-meta">
            <span>${totalSections} sections</span>
            <span class="content-meta-dot">•</span>
            <span>${totalLectures} lectures</span>
            <span class="content-meta-dot">•</span>
            <span>${totalHours}h ${remMin}m total length</span>
          </div>
        </div>
      </div>
      <div class="expand-all" id="expand-all-btn" onclick="toggleAllSections()">Expand all sections</div>
      <div id="sections-accordion" style="margin-top:12px;">
        ${renderAccordion(c.sections)}
      </div>
    </div>

    <!-- Who this is for -->
    <div class="requirements-section">
      <div class="requirements-title">Who this course is for:</div>
      ${(c.targetAudience||[]).map(t=>`
        <div class="req-item">
          <span class="req-bullet">•</span>
          <span>${t}</span>
        </div>
      `).join('')}
    </div>

    <!-- Instructor -->
    <div class="instructor-section">
      <div class="instructor-title">Instructor</div>
      <div class="instructor-card">
        <div class="instructor-avatar" onclick="void(0)">
          ${(c.instructor?.name||'I').charAt(0)}
        </div>
        <div style="flex:1;">
          <div class="instructor-name">${c.instructor?.name||'Instructor'}</div>
          <div class="instructor-title-text">${c.instructor?.title||''}</div>
          <div class="instructor-stats">
            <div class="instructor-stat">⭐ ${(c.instructor?.rating||0).toFixed(1)} Instructor rating</div>
            <div class="instructor-stat">👥 ${UI.formatNumber(c.instructor?.studentsCount||0)} Students</div>
            <div class="instructor-stat">🎓 ${c.instructor?.coursesCount||1} Courses</div>
          </div>
          <div class="instructor-bio">${c.instructor?.bio||''}</div>
        </div>
      </div>
    </div>

    <!-- Reviews -->
    <div class="reviews-section">
      <div class="reviews-title">Student reviews</div>
      <div class="reviews-summary">
        <div class="reviews-big-score">
          <div class="reviews-big-num">${(c.rating||0).toFixed(1)}</div>
          <div class="reviews-big-stars">${'★'.repeat(Math.round(c.rating||0))}</div>
          <div class="reviews-big-label">Course Rating</div>
        </div>
        <div class="reviews-bars" style="flex:1;">
          ${renderRatingBars(c.rating||0)}
        </div>
      </div>
      ${renderReviews(c)}
    </div>

  `;

  // init accordion
  initAccordion();
}

function renderIncludes(c) {
  const inc = c.includes || {};
  return `
    <div class="sidebar-include-item"><span class="sidebar-include-icon">📹</span>${inc.videoHours||0} hours on-demand video</div>
    ${inc.articles ? `<div class="sidebar-include-item"><span class="sidebar-include-icon">📄</span>${inc.articles} articles</div>` : ''}
    ${inc.resources ? `<div class="sidebar-include-item"><span class="sidebar-include-icon">⬇️</span>${inc.resources} downloadable resources</div>` : ''}
    ${inc.mobileAccess ? `<div class="sidebar-include-item"><span class="sidebar-include-icon">📱</span>Access on mobile and TV</div>` : ''}
    ${inc.lifetimeAccess ? `<div class="sidebar-include-item"><span class="sidebar-include-icon">🔗</span>Full lifetime access</div>` : ''}
    ${inc.captions ? `<div class="sidebar-include-item"><span class="sidebar-include-icon">💬</span>Closed captions</div>` : ''}
    ${inc.certificate ? `<div class="sidebar-include-item"><span class="sidebar-include-icon">🏆</span>Certificate of completion</div>` : ''}
  `;
}

function renderAccordion(sections) {
  return sections.map((sec, idx) => `
    <div class="accordion-item ${idx === 0 ? 'open' : ''}" id="acc-${sec.id}">
      <div class="accordion-header" onclick="toggleSection('${sec.id}')">
        <div class="accordion-title">${sec.title}</div>
        <span class="accordion-meta">${sec.lectureCount || (sec.lectures?.length||0)} lectures • ${sec.duration||''}</span>
        ${svgDown}
      </div>
      <div class="accordion-body">
        ${(sec.lectures||[]).map(lec => `
          <div class="lecture-item">
            <span class="lecture-icon">${lec.type === 'article' ? svgDoc : svgPlay}</span>
            <span class="lecture-title">${lec.title}</span>
            ${lec.isPreview ? `<span class="lecture-preview" onclick="handlePreview('${lec.id}','${lec.title}')">Preview</span>` : ''}
            ${lec.duration ? `<span class="lecture-duration">${lec.duration}</span>` : ''}
          </div>
        `).join('')}
      </div>
    </div>
  `).join('');
}

function renderRatingBars(avgRating) {
  const dist = [
    { stars: 5, pct: Math.round(30 + avgRating * 8) },
    { stars: 4, pct: Math.round(50 - avgRating * 2) },
    { stars: 3, pct: 10 },
    { stars: 2, pct: 4 },
    { stars: 1, pct: 3 },
  ];
  return dist.map(d => `
    <div class="review-bar-row">
      <div class="review-bar-wrap" style="cursor:pointer;">
        <div class="review-bar-fill" style="width:${d.pct}%"></div>
      </div>
      <span class="review-bar-label" style="color:#f4c150;">${'★'.repeat(d.stars)}</span>
      <span class="review-bar-pct">${d.pct}%</span>
    </div>
  `).join('');
}

function renderReviews(c) {
  const reviews = [
    { name: 'Marcus T.', color: '#3b82f6', rating: 5, date: '2 weeks ago', text: `This is by far the best ${c.category.replace('-',' ')} course I've taken. The instructor explains everything clearly and the projects are super practical. I went from knowing nothing to building my first app in just a few weeks!` },
    { name: 'Priya M.', color: '#10b981', rating: 5, date: '1 month ago', text: `Absolutely phenomenal course. The depth of content is incredible and everything is explained step by step. I've completed 3 other courses on this platform and this one stands out as the most comprehensive.` },
    { name: 'Ryan K.', color: '#f59e0b', rating: 4, date: '3 weeks ago', text: `Great course overall. I especially loved the project-based approach. Some sections could use updating but the core content is excellent and the instructor is very responsive in the Q&A section.` },
  ];
  return reviews.map(r => `
    <div class="review-card">
      <div class="reviewer-row">
        <div class="reviewer-avatar" style="background:${r.color}">${r.name.charAt(0)}</div>
        <div>
          <div class="reviewer-name">${r.name}</div>
          <div class="reviewer-date">${r.date}</div>
        </div>
      </div>
      <div class="review-stars">${'★'.repeat(r.rating)}${r.rating < 5 ? '☆'.repeat(5-r.rating) : ''}</div>
      <div class="review-text">${r.text}</div>
    </div>
  `).join('');
}

/* ─ SIDEBAR ─ */
function renderSidebar(c) {
  const enrolled = Auth.isEnrolled(c.id);
  const inCart   = Cart.hasItem(c.id);
  const price    = c.price === 0 ? 'Free' : UI.formatPrice(c.price);
  const discount = c.originalPrice ? Math.round((1 - c.price/c.originalPrice)*100) : null;

  document.getElementById('sidebar-card').innerHTML = `
    <div class="sidebar-preview" onclick="handlePreviewVideo()">
      <div style="width:100%;height:100%;background:#1c1d1f;display:flex;align-items:center;justify-content:center;">
        <div style="text-align:center;">
          <svg width="48" height="48" viewBox="0 0 24 24" fill="#888"><path d="M23 7l-7-5-7 5v10l7 5 7-5V7z"/></svg>
          <div style="font-size:12px;color:#888;margin-top:8px;">Course Preview</div>
        </div>
      </div>
      <div class="sidebar-play">
        <div class="sidebar-play-btn">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="#a435f0"><polygon points="5,3 19,12 5,21"/></svg>
        </div>
      </div>
      <div class="sidebar-preview-label">Preview this course</div>
    </div>

    <div class="sidebar-body">
      ${c.price === 0 ? `
        <div class="sidebar-price-row">
          <div class="sidebar-price-current" style="color:#1e7e34;">Free</div>
        </div>
      ` : `
        <div class="sidebar-price-row">
          <div class="sidebar-price-current">${price}</div>
          ${c.originalPrice ? `<div class="sidebar-price-original">${UI.formatPrice(c.originalPrice)}</div>` : ''}
          ${discount ? `<div class="sidebar-discount">${discount}% off</div>` : ''}
        </div>
        <div class="sidebar-timer">
          🕐 <span><strong>2 days</strong> left at this price!</span>
        </div>
      `}

      ${enrolled ? `
        <button class="btn btn-black btn-full" onclick="window.location='learn.html?id=${c.id}'">Go to course</button>
      ` : inCart ? `
        <button class="btn btn-outline-black btn-full" onclick="window.location='cart.html'">Go to cart</button>
      ` : c.price === 0 ? `
        <button class="btn btn-purple btn-full" id="enroll-btn" onclick="handleEnroll()">Enroll now — Free</button>
      ` : `
        <button class="btn btn-purple btn-full" id="add-cart-btn" onclick="handleAddToCart()">Add to cart</button>
        <button class="btn btn-outline-black btn-full mt-8" id="buy-btn" onclick="handleBuyNow()">Buy now</button>
      `}

      <div class="sidebar-guarantee">
        🔒 <span>30-Day Money-Back Guarantee. Full Lifetime Access.</span>
      </div>

      <div class="sidebar-includes">
        <div class="sidebar-includes-title">This course includes:</div>
        ${renderIncludes(c)}
      </div>

      <div class="sidebar-links">
        <a onclick="handleShare()">Share</a>
        <a onclick="handleGift()">Gift this course</a>
        <a onclick="handleCoupon()">Apply Coupon</a>
      </div>
    </div>
  `;
}

function renderMobileBar(c) {
  const enrolled = Auth.isEnrolled(c.id);
  const bar = document.getElementById('mobile-sticky');
  bar.style.display = 'flex';

  document.getElementById('mobile-price').textContent = c.price === 0 ? 'Free' : UI.formatPrice(c.price);
  document.getElementById('mobile-original').textContent = c.originalPrice ? UI.formatPrice(c.originalPrice) : '';

  const btn = document.getElementById('mobile-enroll-btn');
  if (enrolled) {
    btn.textContent = 'Go to course';
    btn.onclick = () => window.location = `learn.html?id=${c.id}`;
  } else if (c.price === 0) {
    btn.textContent = 'Enroll for free';
    btn.onclick = handleEnroll;
  } else {
    btn.textContent = 'Add to cart';
    btn.onclick = handleAddToCart;
  }
}

/* ─ ACCORDION ─ */
function toggleSection(id) {
  const el = document.getElementById('acc-' + id);
  if (el) el.classList.toggle('open');
}

function initAccordion() {
  // sections already open/closed via class
}

let allOpen = false;
function toggleAllSections() {
  allOpen = !allOpen;
  document.querySelectorAll('.accordion-item').forEach(el => {
    el.classList.toggle('open', allOpen);
  });
  document.getElementById('expand-all-btn').textContent = allOpen ? 'Collapse all sections' : 'Expand all sections';
}

/* ─ ACTIONS ─ */
function handleAddToCart() {
  if (!currentCourse) return;
  const added = Cart.addItem(currentCourse);
  if (added) {
    UI.toast('Added to cart!', 'success');
    renderSidebar(currentCourse);
    renderMobileBar(currentCourse);
  } else {
    UI.toast('Already in cart');
  }
}

function handleBuyNow() {
  handleAddToCart();
  setTimeout(() => window.location = 'cart.html', 400);
}

function handleEnroll() {
  if (!Auth.isLoggedIn()) {
    window.location = `login.html?redirect=course.html?id=${currentCourse?.id}`;
    return;
  }
  const btn = document.getElementById('enroll-btn');
  if (btn) { btn.disabled = true; btn.textContent = 'Enrolling…'; }
  CoursidAPI.enrollCourse(currentCourse.id).then(() => {
    UI.toast('Successfully enrolled!', 'success');
    renderSidebar(currentCourse);
    renderMobileBar(currentCourse);
  });
}

function handlePreview(id, title) {
  UI.toast(`Preview: "${title}" — video player coming soon`, 'default', 3000);
}

function handlePreviewVideo() {
  UI.toast('Course preview player coming soon!', 'default');
}

function handleShare() {
  if (navigator.share) {
    navigator.share({ title: currentCourse?.title, url: window.location.href });
  } else {
    navigator.clipboard?.writeText(window.location.href);
    UI.toast('Course link copied!', 'success');
  }
}

function handleGift() { UI.toast('Gift feature coming soon!'); }
function handleCoupon() {
  const code = prompt('Enter coupon code:');
  if (code) UI.toast(`Coupon "${code}" applied! (demo)`, 'success');
}
</script>

</body>
</html>
